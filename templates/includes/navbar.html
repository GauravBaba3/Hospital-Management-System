{% load static %}
<nav class="navbar navbar-expand-lg cf-navbar sticky-top">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'doctorshome' %}">
      <span class="d-inline-flex align-items-center justify-content-center rounded-circle bg-primary text-white"
        style="width: 36px; height: 36px;" aria-hidden="true">
        <i class="bi bi-heart-pulse-fill small"></i>
      </span>
      <span>CarePortal</span>
    </a>
    <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse"
      data-bs-target="#cfNavbar" aria-controls="cfNavbar" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="cfNavbar">
      <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">
        <li class="nav-item">
          <a class="nav-link{% if request.resolver_match.url_name == 'doctorshome' %} active{% endif %}"
            href="{% url 'doctorshome' %}"><i class="bi bi-house-door me-1"></i>Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link{% if request.resolver_match.url_name == 'alldoctors' %} active{% endif %}"
            href="{% url 'alldoctors' %}"><i class="bi bi-people me-1"></i>Doctors</a>
        </li>
        <li class="nav-item">
          <a class="nav-link{% if request.resolver_match.url_name == 'treatment' or request.resolver_match.url_name == 'doctorslist' %} active{% endif %}"
            href="{% url 'treatment' %}"><i class="bi bi-hospital me-1"></i>Treatments</a>
        </li>

        {% if user.is_authenticated %}
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            <i class="bi bi-grid-3x3-gap me-1"></i>Lab &amp; staff
          </a>
          <ul class="dropdown-menu dropdown-menu-end shadow border-0 rounded-3">
            <li><a class="dropdown-item rounded-2" href="{% url 'labtech' %}"><i class="bi bi-person-badge me-2"></i>Lab
                technicians</a></li>
            <li><a class="dropdown-item rounded-2" href="{% url 'labtest' %}"><i class="bi bi-clipboard2-pulse me-2"></i>Lab
                tests</a></li>
            <li><a class="dropdown-item rounded-2" href="{% url 'dashboard' %}"><i class="bi bi-speedometer2 me-2"></i>Lab
                dashboard</a></li>
            <li>
              <hr class="dropdown-divider">
            </li>
            <li><a class="dropdown-item rounded-2" href="{% url 'labtechreg' %}"><i
                  class="bi bi-person-plus me-2"></i>Register lab tech</a></li>
          </ul>
        </li>
        <li class="nav-item">
          <a class="nav-link{% if request.resolver_match.url_name == 'discharge' %} active{% endif %}"
            href="{% url 'discharge' %}"><i class="bi bi-file-earmark-medical me-1"></i>Discharge</a>
        </li>
        <li class="nav-item">
          <a class="nav-link{% if request.resolver_match.url_name == 'profile' %} active{% endif %}"
            href="{% url 'profile' %}"><i class="bi bi-person-circle me-1"></i>Profile</a>
        </li>
        <li class="nav-item mt-2 mt-lg-0 ms-lg-2">
          <a class="btn btn-outline-danger btn-sm rounded-pill px-3" href="{% url 'logout' %}"><i
              class="bi bi-box-arrow-right me-1"></i>Logout</a>
        </li>
        {% else %}
        <li class="nav-item">
          <a class="nav-link{% if request.resolver_match.url_name == 'login' %} active{% endif %}"
            href="{% url 'login' %}"><i class="bi bi-box-arrow-in-right me-1"></i>Login</a>
        </li>
        <li class="nav-item mt-2 mt-lg-0 ms-lg-2">
          <a class="btn btn-primary btn-sm cf-btn-primary rounded-pill px-3" href="{% url 'register' %}"><i
              class="bi bi-person-plus me-1"></i>Register</a>
        </li>
        {% endif %}
      </ul>
    </div>
  </div>
</nav>
