{% extends 'base.html' %}

{% block title %}Sign in{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="card cf-card-hover cf-auth-card cf-animate-in border-0 p-4 p-md-5 shadow">
        <div class="text-center mb-4">
            <span class="d-inline-flex rounded-circle bg-primary bg-opacity-10 text-primary align-items-center justify-content-center mb-3"
                style="width: 56px; height: 56px;">
                <i class="bi bi-shield-lock fs-4"></i>
            </span>
            <h1 class="h4 fw-bold mb-1">Welcome back</h1>
            <p class="text-muted small mb-0">Sign in to book appointments and manage your care profile.</p>
        </div>

        <form action="{% url 'login' %}" method="post" novalidate>
            {% csrf_token %}
            <div class="mb-3">
                <label for="username" class="form-label fw-semibold small">Username</label>
                <input type="text" class="form-control form-control-lg" name="username" id="username"
                    autocomplete="username" placeholder="Enter your username" required>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label fw-semibold small">Password</label>
                <input type="password" class="form-control form-control-lg" name="password" id="password"
                    autocomplete="current-password" placeholder="Enter your password" required>
                <div class="form-text">Use the same credentials you chose at registration.</div>
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg cf-btn-primary"><i class="bi bi-box-arrow-in-right me-2"></i>Sign
                    in</button>
            </div>
            <p class="text-center text-muted small mt-4 mb-0">
                New here? <a href="{% url 'register' %}" class="fw-semibold">Create an account</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
